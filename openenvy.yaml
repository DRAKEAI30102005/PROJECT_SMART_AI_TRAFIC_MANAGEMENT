openapi: 3.1.0
info:
  title: SmartFlow AI Benchmark API
  version: 1.0.0
  description: Alias copy of the project OpenAPI definition for validators that expect openenvy.yaml.
servers:
  - url: http://localhost:3001
paths:
  /health:
    get:
      summary: Health check
      operationId: health
      responses:
        "200":
          description: Service is available
  /tasks:
    get:
      summary: Enumerate benchmark tasks
      operationId: tasks
      responses:
        "200":
          description: Available tasks
  /reset:
    post:
      summary: Reset the benchmark environment
      operationId: reset
      responses:
        "200":
          description: Reset benchmark state
  /state:
    get:
      summary: Get current benchmark state
      operationId: state
      responses:
        "200":
          description: Current state
  /step:
    post:
      summary: Apply a traffic-light control action
      operationId: step
      responses:
        "200":
          description: Result of the action
